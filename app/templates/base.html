<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <title>{% block title %}{% endblock %} - AmadeusX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />
</head>

<body>
  <div class="app">{% block content %}{% endblock %}</div>

  <!-- Модальное окно для ввода ключа -->
  <div class="modal" id="key-modal">
    <div class="modal__content">
      <h3 class="modal__title">Введите ключ шифрования</h3>
      <p class="modal__description">
        Этот ключ используется для шифрования и дешифрования сообщений. Он не
        будет отправлен на сервер.
      </p>
      <input type="password" id="encryption-key-input" class="form-group__input" placeholder="Ваш секретный ключ"
        autocomplete="off" />
      <button id="confirm-key-button" class="btn btn--primary btn--full">
        Подтвердить
      </button>
      <p class="modal__error" id="key-modal-error"></p>
    </div>
  </div>

  <!-- Socket.IO v4.7.5 с SRI -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"
    integrity="sha512-11t8Q+vY9JlCrr+PveZKTYJq8n7O09Y5X/pk/aMd3vJugSvu4xOunGEUzaADqL3I8cZKE/pBwwCfXzDkRJh2sQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="{{ url_for('static', filename='scripts/scripts.js') }}" integrity="{{ scripts_js_hash }}"
    crossorigin="anonymous"></script>

  <!-- Регистрация Service Worker + обработка нарушения целостности -->
  <script nonce="{{ csp_nonce() }}">
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .catch(function () { });
      navigator.serviceWorker.addEventListener('message', function (event) {
        if (event.data && event.data.type === 'INTEGRITY_VIOLATION') {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#ff4444;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><h1>⚠️ Обнаружена подмена кода</h1><p>Файл скриптов был изменён на сервере. Возможна атака.<br>Не вводите никаких данных. Обратитесь к администратору.</p></div></div>';
        }
      });
    }
  </script>
</body>

</html>
